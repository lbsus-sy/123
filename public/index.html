<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xray Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--bg2:#16213e;--card:#0f3460;--primary:#e94560;--accent:#533483;--text:#e0e0e0;--text2:#a0a0b0;--border:#2a2a4a;--success:#4caf50;--danger:#f44336;--warning:#ff9800}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.login-page{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,var(--bg),var(--bg2))}
.login-card{background:var(--card);padding:40px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.3);width:380px}
.login-card h2{text-align:center;margin-bottom:30px;color:#fff}
.login-card h2 span{color:var(--primary)}
.login-card input{width:100%;padding:12px;margin-bottom:16px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px}
.login-card input:focus{outline:none;border-color:var(--primary)}
.login-card button{width:100%;padding:12px;border:none;border-radius:6px;background:var(--primary);color:#fff;font-size:16px;cursor:pointer;transition:.3s}
.login-card button:hover{opacity:.9}
.login-error{color:var(--danger);text-align:center;margin-top:10px;display:none}

.app{display:none}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;z-index:100}
.sidebar-header{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:10px}
.sidebar-header h2{color:#fff;font-size:18px}
.sidebar-header .version{font-size:11px;color:var(--text2);display:block;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;transition:.2s;color:var(--text2);border-left:3px solid transparent}
.nav-item:hover{background:rgba(233,69,96,.1);color:var(--text)}
.nav-item.active{background:rgba(233,69,96,.15);color:var(--primary);border-left-color:var(--primary)}
.nav-item .icon{font-size:18px;width:22px;text-align:center}
.main{margin-left:240px;padding:20px;min-height:100vh}

.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--bg2);border-radius:8px;margin-bottom:20px;border:1px solid var(--border)}
.topbar h1{font-size:20px;color:#fff}
.topbar .sub{font-size:12px;color:var(--text2);margin-left:8px}
.topbar-right{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text2)}
.logout-btn{padding:6px 16px;background:transparent;border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer;font-size:13px}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px}
.stat-card .val{font-size:24px;font-weight:bold;color:#fff;margin-bottom:4px}
.stat-card .lbl{font-size:12px;color:var(--text2)}
.stat-card .sval{font-size:13px;color:var(--text2);margin-top:4px}
.status-on{color:var(--success)}
.status-off{color:var(--danger)}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-header h3{color:#fff;font-size:16px}

.btn{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:13px;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-success{background:var(--success);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}

.node-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.node-card .protocol{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.proto-vless{background:#e94560;color:#fff}
.proto-vmess{background:#533483;color:#fff}
.proto-trojan{background:#4caf50;color:#fff}
.node-card .link-text{background:var(--bg);padding:8px;border-radius:4px;font-size:11px;word-break:break-all;margin-top:8px;font-family:monospace;border:1px solid var(--border);color:var(--text2);line-height:1.5}
.copy-btn{float:right;padding:2px 8px;font-size:11px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:3px;cursor:pointer}
.copy-btn:hover{border-color:var(--primary)}
.node-meta{display:flex;gap:12px;margin-top:8px;font-size:12px;color:var(--text2)}

/* Subscription */
.sub-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:16px}
.sub-box .url{font-family:monospace;font-size:13px;color:var(--primary);word-break:break-all;margin-top:8px;padding:8px;background:var(--bg);border-radius:4px}

/* Details */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-item{padding:8px;background:var(--bg);border-radius:4px;font-size:13px}
.detail-item .k{color:var(--text2)}
.detail-item .v{color:#fff;margin-left:4px}

.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:6px;color:#fff;font-size:13px;z-index:2000;display:none;animation:slideIn .3s}
.toast-s{background:var(--success)}
.toast-e{background:var(--danger)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar .nav-item span:not(.icon){display:none}
  .sidebar-header h2{font-size:14px}.sidebar-header .version{display:none!important}
  .main{margin-left:60px}
  .detail-grid{grid-template-columns:1fr}
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="login-page" id="loginPage">
  <div class="login-card">
    <h2>🔐 <span>Xray</span> Panel</h2>
    <input type="text" id="loginUser" placeholder="Username" value="admin">
    <input type="password" id="loginPass" placeholder="Password" value="admin123">
    <button onclick="login()">Login</button>
    <div class="login-error" id="loginError">Invalid credentials</div>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>⚡ Xray <span class="version">v1.0.0</span></h2>
    </div>
    <div class="nav-item active" onclick="showPage('dashboard')"><span class="icon">📊</span><span>Dashboard</span></div>
    <div class="nav-item" onclick="showPage('nodes')"><span class="icon">🔗</span><span>Nodes</span></div>
    <div class="nav-item" onclick="showPage('sub')"><span class="icon">📋</span><span>Subscription</span></div>
    <div class="nav-item" onclick="showPage('details')"><span class="icon">ℹ️</span><span>Details</span></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1 id="pageTitle">Dashboard <span class="sub" id="pageSub">Overview</span></h1>
      <div class="topbar-right">
        <span id="statusDisplay">⏳ Loading...</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div id="dashboard">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="card">
        <div class="card-header"><h3>⚙️ Service Status</h3></div>
        <div class="stats-grid" id="serviceGrid" style="grid-template-columns:repeat(3,1fr)"></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>📋 Server Info</h3></div>
        <div id="serverInfo" style="font-size:13px;color:var(--text2)"></div>
      </div>
    </div>

    <div id="nodes" style="display:none">
      <div class="section-header card-header">
        <h3>🔗 Generated Nodes</h3>
        <button class="btn btn-primary btn-sm" onclick="copyAllNodes()">📋 Copy All</button>
      </div>
      <div id="nodeList"></div>
    </div>

    <div id="sub" style="display:none">
      <div class="card">
        <div class="card-header"><h3>📋 Subscription Links</h3></div>
        <div class="sub-box" id="subContent">
          <div style="font-size:13px;color:var(--text2)">Loading subscription info...</div>
        </div>
      </div>
    </div>

    <div id="details" style="display:none">
      <div class="card">
        <div class="card-header"><h3>ℹ️ System Details</h3></div>
        <div class="detail-grid" id="detailGrid"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let token=localStorage.getItem('token');
let statusData=null;

function toast(msg,t){const e=document.getElementById('toast');e.textContent=msg;e.className='toast toast-'+(t||'s');e.style.display='block';setTimeout(()=>e.style.display='none',2500)}

async function api(path,opts={}){
  const h={};
  if(token)h['Authorization']='Basic '+token;
  if(opts.body&&!(opts.body instanceof FormData))h['Content-Type']='application/json';
  const r=await fetch(path,{...opts,headers:h});
  if(r.status===401){logout();return null}
  try{return await r.json()}catch{return null}
}

async function login(){
  const u=document.getElementById('loginUser').value,p=document.getElementById('loginPass').value;
  const r=await api('/api/login',{method:'POST',body:JSON.stringify({username:u,password:p})});
  if(r&&r.token){
    token=r.token;localStorage.setItem('token',token);
    document.getElementById('loginPage').style.display='none';
    document.getElementById('app').style.display='block';
    loadAll();
  }else{document.getElementById('loginError').style.display='block'}
}

function logout(){token=null;localStorage.removeItem('token');document.getElementById('loginPage').style.display='flex';document.getElementById('app').style.display='none'}

if(token){api('/api/status').then(d=>{if(d){document.getElementById('loginPage').style.display='none';document.getElementById('app').style.display='block';loadAll()}else localStorage.removeItem('token')}).catch(()=>localStorage.removeItem('token'))}

async function loadAll(){
  statusData=await api('/api/status');
  updateStatus();
  loadDashboard();
  loadNodes();
  loadSub();
  loadDetails();
}

function updateStatus(){
  const s=document.getElementById('statusDisplay');
  if(!statusData)return;
  const running=statusData.running;
  const parts=[];
  parts.push(running.xray?'<span class="status-on">✓ Xray</span>':'<span class="status-off">✗ Xray</span>');
  parts.push(running.cloudflared?'<span class="status-on">✓ Argo</span>':'<span class="status-off">✗ Argo</span>');
  s.innerHTML=parts.join(' | ');
}

function showPage(p){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.main > div[id]').forEach(d=>d.style.display='none');
  document.querySelector('.nav-item[onclick*="'+p+'"]')?.classList.add('active');
  document.getElementById(p).style.display='block';
  const t={dashboard:['Dashboard','Overview'],nodes:['Nodes','Generated links'],sub:['Subscription','Subscribe URL'],details:['Details','System info']};
  const ti=t[p]||['Page',''];
  document.getElementById('pageTitle').textContent=ti[0];
  document.getElementById('pageSub').textContent=ti[1];
  if(p==='dashboard')loadDashboard();
  if(p==='nodes')loadNodes();
  if(p==='sub')loadSub();
  if(p==='details')loadDetails();
}

function loadDashboard(){
  if(!statusData)return;
  const s=statusData;
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="val">${s.argoDomain||'⏳'}</div><div class="lbl">Argo Domain</div><div class="sval">${s.running.cloudflared?'● Active':'○ Waiting'}</div></div>
    <div class="stat-card"><div class="val">${s.ip||'Detecting...'}</div><div class="lbl">Server IP</div><div class="sval">${s.isp||'Unknown'}</div></div>
    <div class="stat-card"><div class="val">${s.uuid.substring(0,8)}...</div><div class="lbl">UUID</div><div class="sval">Port: ${s.port}</div></div>
    <div class="stat-card"><div class="val">${s.cfip?.[0]?.[0]||'N/A'}</div><div class="lbl">CF IP</div><div class="sval">Port: ${s.cfip?.[0]?.[1]||'N/A'}</div></div>
  `;
  document.getElementById('serviceGrid').innerHTML=`
    <div class="stat-card"><div class="val ${s.running.xray?'status-on':'status-off'}">${s.running.xray?'✓':'✗'}</div><div class="lbl">Xray Core</div></div>
    <div class="stat-card"><div class="val ${s.running.cloudflared?'status-on':'status-off'}">${s.running.cloudflared?'✓':'✗'}</div><div class="lbl">Cloudflared</div></div>
    <div class="stat-card"><div class="val ${s.running.nezha?'status-on':'status-off'}">${s.running.nezha?'✓':'-'}</div><div class="lbl">Nezha</div></div>
  `;
  document.getElementById('serverInfo').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><strong>Argo Domain:</strong> ${s.argoDomain||'Waiting for tunnel...'}</div>
      <div><strong>IP:</strong> ${s.ip||'Detecting...'}</div>
      <div><strong>ISP:</strong> ${s.isp||'Unknown'}</div>
      <div><strong>UUID:</strong> ${s.uuid}</div>
      <div><strong>Server Port:</strong> ${s.port}</div>
      <div><strong>Sub Path:</strong> /${s.subPath}</div>
      <div><strong>Node Name:</strong> ${s.nodeName||'Auto'}</div>
    </div>
  `;
}

async function loadNodes(){
  if(!statusData)return;
  const data=await api('/api/nodes');
  if(!data||!data.nodes){document.getElementById('nodeList').innerHTML='<div style="color:var(--text2);text-align:center;padding:40px">No nodes generated yet. Waiting for Argo tunnel...</div>';return}
  const container=document.getElementById('nodeList');
  if(data.nodes.length===0){
    container.innerHTML='<div style="color:var(--text2);text-align:center;padding:40px">⏳ Waiting for Argo tunnel to start... Auto-refreshing in 10s</div>';
    setTimeout(loadNodes,10000);
    return;
  }
  container.innerHTML=data.nodes.map((link,i)=>{
    const proto=link.startsWith('vless')?'VLESS':link.startsWith('vmess')?'VMess':link.startsWith('trojan')?'Trojan':'Other';
    const css=proto==='VLESS'?'proto-vless':proto==='VMess'?'proto-vmess':'proto-trojan';
    return `<div class="node-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><span class="protocol ${css}">${proto}</span> <span style="font-size:13px;margin-left:8px">Node ${i+1}</span></div>
        <button class="copy-btn" onclick="copyText('${link.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">📋 Copy</button>
      </div>
      <div class="link-text">${link}</div>
    </div>`
  }).join('');
}

async function loadSub(){
  if(!statusData)return;
  const container=document.getElementById('subContent');
  const subUrl=window.location.origin+'/'+statusData.subPath;
  container.innerHTML=`
    <div style="font-size:13px;color:var(--text2);margin-bottom:8px">Use this URL in your v2ray client:</div>
    <div class="url">${subUrl}</div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-sm btn-primary" onclick="copyText('${subUrl}')">📋 Copy URL</button>
      <button class="btn btn-sm btn-outline" onclick="window.open('${subUrl}','_blank')">🔗 Open</button>
    </div>
    <div style="margin-top:12px;font-size:12px;color:var(--text2)">Status: ${statusData.argoDomain?'<span class="status-on">● Online</span>':'<span class="status-off">○ Waiting for tunnel</span>'}</div>
  `;
}

function loadDetails(){
  if(!statusData)return;
  const s=statusData;
  document.getElementById('detailGrid').innerHTML=`
    <div class="detail-item"><span class="k">Protocols:</span><span class="v">VLESS + VMess + Trojan</span></div>
    <div class="detail-item"><span class="k">Transport:</span><span class="v">WebSocket</span></div>
    <div class="detail-item"><span class="k">Security:</span><span class="v">TLS via Argo</span></div>
    <div class="detail-item"><span class="k">Argo Domain:</span><span class="v">${s.argoDomain||'⏳'}</span></div>
    <div class="detail-item"><span class="k">Server IP:</span><span class="v">${s.ip||'⏳'}</span></div>
    <div class="detail-item"><span class="k">ISP:</span><span class="v">${s.isp||'Unknown'}</span></div>
    <div class="detail-item"><span class="k">Xray:</span><span class="v ${s.running.xray?'status-on':'status-off'}">${s.running.xray?'Running':'Stopped'}</span></div>
    <div class="detail-item"><span class="k">Cloudflared:</span><span class="v ${s.running.cloudflared?'status-on':'status-off'}">${s.running.cloudflared?'Running':'Starting...'}</span></div>
    <div class="detail-item"><span class="k">Nezha:</span><span class="v ${s.running.nezha?'status-on':'status-off'}">${s.running.nezha?'Running':'Not configured'}</span></div>
    <div class="detail-item"><span class="k">CF IP List:</span><span class="v">${s.cfip?.map(e=>e[0]+':'+e[1]).join(', ')||'Default'}</span></div>
    <div class="detail-item"><span class="k">Port:</span><span class="v">${s.port}</span></div>
    <div class="detail-item"><span class="k">Sub Path:</span><span class="v">/${s.subPath}</span></div>
  `;
}

function copyText(t){
  navigator.clipboard.writeText(t).catch(()=>{});
  toast('Copied!');
}

async function copyAllNodes(){
  const data=await api('/api/nodes');
  if(data&&data.raw){
    navigator.clipboard.writeText(data.raw).catch(()=>{});
    toast(data.nodes.length+' nodes copied!');
  }else{
    toast('No nodes available yet','e');
  }
}

// Auto refresh
setInterval(async()=>{
  if(document.getElementById('app').style.display!=='none'){
    statusData=await api('/api/status');
    updateStatus();
  }
},15000);
</script>
</body>
</html>
